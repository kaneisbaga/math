<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Math Quiz: 2-Digit Add & Sub (難度分層版)</title>
    <style>
        @page { size: A4; margin: 0.5cm; }
        body { font-family: "Microsoft JhengHei", sans-serif; margin: 0; padding: 0; background-color: #fff; line-height: 1.2; }
        .page-container { padding-top: 1.2cm; min-height: 28cm; box-sizing: border-box; }
        .no-print { background: #e3f2fd; padding: 15px; border: 1px solid #2196f3; border-radius: 8px; margin: 10px; }
        .page-break { page-break-after: always; }
        .header-title { text-align: center; font-size: 24px; font-weight: bold; margin-top: 0; margin-bottom: 5px; }
        .info-bar { display: flex; justify-content: space-around; margin: 5px 15px; padding-bottom: 5px; border-bottom: 2px solid #000; font-size: 14px; }
        .example-section { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 0 15px 10px 15px; padding: 8px; border: 2px solid #444; border-radius: 8px; background-color: #fcfcfc; }
        .ex-title { grid-column: span 2; font-weight: bold; font-size: 14px; color: #1976d2; margin-bottom: 2px; }
        .step-hint { font-size: 11px; color: #666; margin-top: 1px; font-weight: bold; text-align: center;}
        .quiz-grid { display: grid; grid-template-columns: repeat(4, 1fr); column-gap: 15px; padding: 0 15px; }
        .q-item { display: flex; flex-direction: column; justify-content: center; height: 78px; border-bottom: 1px dashed #bbb; }
        .q-main { display: flex; align-items: center; width: 100%; }
        .q-num { font-size: 12px; font-weight: bold; width: 25px; }
        .math-box { display: flex; align-items: center; font-size: 19px; min-width: 100px; justify-content: flex-start; font-family: 'Courier New', Courier, monospace; font-weight: bold; }
        .equal { margin: 0 8px; font-size: 16px; font-weight: bold; }
        .ans-area { flex-grow: 1; border-bottom: 1.5px solid #000; height: 30px; margin-right: 5px; }
        .is-answer-page .ans-area { border-bottom: none; color: #d32f2f; font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 18px; background: #fff5f5; }
        .is-answer-page .header-title { color: #d32f2f; }
        .is-answer-page .info-bar { border-bottom-color: #d32f2f; color: #d32f2f; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="no-print">
    <h3 style="margin:0;">🧮 兩位數加減法 (難度分層版)</h3>
    <p>比例：極易(10)、簡易(10)、普通(10)、極難(5)、地獄(5)。自動過濾負數結果。</p>
    <button onclick="window.print()" style="padding: 10px 20px; background: #1976d2; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">🖨️ 滿版列印</button>
    <button onclick="location.reload()" style="padding: 10px 20px; margin-left:10px; cursor: pointer;">🔄 重新出題</button>
</div>

<div class="page-break page-container">
    <div class="header-title">Addition & Subtraction (2-Digit)</div>
    <div class="info-bar">
        <span>姓名：__________</span>
        <span class="date-display"></span>
        <span>得分：__________</span>
    </div>
    
    <div class="example-section">
        <div class="ex-title">💡 解題範例</div>
        <div style="display:flex; flex-direction:column; border-right: 1px solid #ccc;">
            <div class="q-main">
                <span style="font-size:12px; font-weight:bold; margin-right:5px;">[加法]</span>
                <div class="math-box">45 + 38</div><div class="equal">=</div>
                <div style="color:#d32f2f; font-weight:bold; font-size:20px;">83</div>
            </div>
            <div class="step-hint">想：5+8=13 (進1)，4+3+1=8</div>
        </div>
        <div style="display:flex; flex-direction:column;">
            <div class="q-main">
                <span style="font-size:12px; font-weight:bold; margin-right:5px;">[減法]</span>
                <div class="math-box">72 - 25</div><div class="equal">=</div>
                <div style="color:#d32f2f; font-weight:bold; font-size:20px;">47</div>
            </div>
            <div class="step-hint">想：2不夠減5，借10減5加2=7，7變6...</div>
        </div>
    </div>

    <div class="quiz-grid" id="quiz-content"></div>
</div>

<div class="is-answer-page page-container">
    <div class="header-title">【答案卷】2-Digit Add & Sub</div>
    <div class="info-bar">
        <span class="date-display"></span>
        <span>對照題號批改</span>
    </div>
    <div class="quiz-grid" id="answer-content"></div>
</div>

<script>
    function init() {
        const today = new Date();
        const dateStr = `日期：${today.getFullYear()}年${today.getMonth() + 1}月${today.getDate()}日`;
        document.querySelectorAll('.date-display').forEach(el => el.innerText = dateStr);

        const quizContainer = document.getElementById('quiz-content');
        const ansContainer = document.getElementById('answer-content');
        
        let levels = { veryEasy: [], easy: [], normal: [], hard: [], hell: [] };

        // 生成題目池 (2位數：10-99)
        for (let a = 10; a <= 99; a++) {
            for (let b = 10; b <= 99; b++) {
                // 隨機分配加法或減法 (a + b 或 a - b)
                ['+', '-'].forEach(op => {
                    if (op === '-' && a < b) return; // 減法不出現負數
                    
                    let result = (op === '+') ? a + b : a - b;
                    let item = { a: a, b: b, op: op, ans: result };
                    
                    // 判斷難度
                    let isCarryOrBorrow = false;
                    if (op === '+') {
                        if ((a % 10) + (b % 10) >= 10) isCarryOrBorrow = true;
                    } else {
                        if ((a % 10) < (b % 10)) isCarryOrBorrow = true;
                    }

                    if (!isCarryOrBorrow && a < 50 && b < 50) {
                        levels.veryEasy.push(item);
                    } else if (isCarryOrBorrow && a < 40 && b < 40) {
                        levels.easy.push(item);
                    } else if (a < 70 && b < 70) {
                        levels.normal.push(item);
                    } else if (a < 90 && b < 90) {
                        levels.hard.push(item);
                    } else {
                        levels.hell.push(item);
                    }
                });
            }
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // 依比例選題 10:10:10:5:5
        let selected = [
            ...shuffle(levels.veryEasy).slice(0, 10),
            ...shuffle(levels.easy).slice(0, 10),
            ...shuffle(levels.normal).slice(0, 10),
            ...shuffle(levels.hard).slice(0, 5),
            ...shuffle(levels.hell).slice(0, 5)
        ];

        shuffle(selected);

        let quizHtml = '';
        let ansHtml = '';

        selected.forEach((item, index) => {
            const i = index + 1;
            const probStr = `${item.a} ${item.op} ${item.b}`;
            
            quizHtml += `<div class="q-item"><div class="q-main"><div class="q-num">${i}.</div><div class="math-box">${probStr}</div><div class="equal">=</div><div class="ans-area"></div></div></div>`;
            ansHtml += `<div class="q-item"><div class="q-main"><div class="q-num">${i}.</div><div class="math-box">${probStr}</div><div class="equal">=</div><div class="ans-area">${item.ans}</div></div></div>`;
        });

        quizContainer.innerHTML = quizHtml;
        ansContainer.innerHTML = ansHtml;
    }

    window.onload = init;
</script>

</body>
</html>
