<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>分數練習_下移避開切邊版</title>
    <style>
        @page { size: A4; margin: 0.5cm; }
        body { font-family: "Microsoft JhengHei", sans-serif; margin: 0; padding: 0; background-color: #fff; line-height: 1.2; }
        
        /* 解決切邊問題：讓內容從距離紙張頂部 1.2cm 處才開始 */
        .page-container { 
            padding-top: 1.2cm; 
            min-height: 28cm; 
            box-sizing: border-box;
        }

        .no-print { background: #fff3e0; padding: 15px; border: 1px solid #ff9800; border-radius: 8px; margin: 10px; }
        .page-break { page-break-after: always; }

        .header-title { text-align: center; font-size: 24px; font-weight: bold; margin-top: 0; margin-bottom: 5px; }
        .info-bar { display: flex; justify-content: space-around; margin: 5px 15px; padding-bottom: 5px; border-bottom: 2px solid #000; font-size: 14px; }
        
        .example-section {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 15px; margin: 0 15px 10px 15px; padding: 8px;
            border: 2px solid #444; border-radius: 8px; background-color: #fcfcfc;
        }
        .ex-title { grid-column: span 2; font-weight: bold; font-size: 14px; color: #d32f2f; margin-bottom: 2px; }
        .step-hint { font-size: 11px; color: #d32f2f; margin-top: 1px; font-weight: bold; text-align: center;}

        .quiz-grid { display: grid; grid-template-columns: repeat(4, 1fr); column-gap: 15px; padding: 0 15px; }
        
        /* 微調高度至 78px 以騰出上方 1.2cm 的空間 */
        .q-item { display: flex; flex-direction: column; justify-content: center; height: 78px; border-bottom: 1px dashed #bbb; }
        
        .q-main { display: flex; align-items: center; width: 100%; }
        .q-num { font-size: 12px; font-weight: bold; width: 25px; }
        .math-box { display: flex; align-items: center; font-size: 19px; min-width: 50px; justify-content: center; }
        .fraction { display: inline-flex; flex-direction: column; align-items: center; line-height: 1; margin: 0 4px; }
        .num { border-bottom: 2px solid #000; padding: 0 4px; margin-bottom: 2px; }
        .den { padding: 0 4px; }
        .whole { font-size: 22px; font-weight: bold; margin-right: 1px; }
        .equal { margin: 0 8px; font-size: 16px; font-weight: bold; }
        .ans-area { flex-grow: 1; border-bottom: 1.5px solid #000; height: 35px; margin-right: 5px; }
        
        .is-answer-page .ans-area { border-bottom: none; color: #d32f2f; font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 18px; background: #fff5f5; }
        .is-answer-page .header-title { color: #d32f2f; }
        .is-answer-page .info-bar { border-bottom-color: #d32f2f; color: #d32f2f; }

        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="no-print">
    <h3 style="margin:0;">🚀 內容下移修正版</h3>
    <p>已經將標題內容整體<b>下移 1.2 公分</b>，防止印表機切掉最上方的文字。</p>
    <button onclick="window.print()" style="padding: 10px 20px; background: #e65100; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">🖨️ 滿版列印</button>
    <button onclick="location.reload()" style="padding: 10px 20px; margin-left:10px; cursor: pointer;">🔄 換一組題</button>
</div>

<div class="page-break page-container">
    <div class="header-title">分數轉換練習題 (40題)</div>
    <div class="info-bar">
        <span>姓名：__________</span>
        <span class="date-display"></span>
        <span>得分：__________</span>
    </div>
    
    <div class="example-section">
        <div class="ex-title">💡 解題示範</div>
        <div style="display:flex; flex-direction:column; border-right: 1px solid #ccc;">
            <div class="q-main">
                <span style="font-size:12px; font-weight:bold; margin-right:5px;">[例A]</span>
                <div class="math-box"><div class="fraction"><div class="num">17</div><div class="den">5</div></div></div><div class="equal">=</div>
                <div style="display:flex; align-items:center; color:#d32f2f; font-weight:bold;"><span class="whole" style="font-size:18px">3</span><div class="fraction" style="font-size:14px"><div class="num">2</div><div class="den">5</div></div></div>
            </div>
            <div class="step-hint">想：17 ÷ 5 = 3 ... 餘 2</div>
        </div>
        <div style="display:flex; flex-direction:column;">
            <div class="q-main">
                <span style="font-size:12px; font-weight:bold; margin-right:5px;">[例B]</span>
                <div class="math-box"><span class="whole">2</span><div class="fraction"><div class="num">3</div><div class="den">4</div></div></div><div class="equal">=</div>
                <div style="display:flex; align-items:center; color:#d32f2f; font-weight:bold;"><div class="fraction" style="font-size:16px"><div class="num">11</div><div class="den">4</div></div></div>
            </div>
            <div class="step-hint">想：(2 × 4) + 3 = 11</div>
        </div>
    </div>

    <div class="quiz-grid" id="quiz-content"></div>
</div>

<div class="is-answer-page page-container">
    <div class="header-title">【答案卷】分數轉換練習題</div>
    <div class="info-bar">
        <span class="date-display"></span>
        <span>對照題號批改</span>
    </div>

    <div class="example-section">
        <div class="ex-title">💡 解題示範答案</div>
        <div style="display:flex; flex-direction:column; border-right: 1px solid #ccc;">
            <div class="q-main">
                <span style="font-size:12px; font-weight:bold; margin-right:5px;">[例A]</span>
                <div class="math-box"><div class="fraction"><div class="num">17</div><div class="den">5</div></div></div><div class="equal">=</div>
                <div style="display:flex; align-items:center; color:#d32f2f;"><span class="whole" style="font-size:18px">3</span><div class="fraction" style="font-size:14px"><div class="num">2</div><div class="den">5</div></div></div>
            </div>
        </div>
        <div style="display:flex; flex-direction:column;">
            <div class="q-main">
                <span style="font-size:12px; font-weight:bold; margin-right:5px;">[例B]</span>
                <div class="math-box"><span class="whole">2</span><div class="fraction"><div class="num">3</div><div class="den">4</div></div></div><div class="equal">=</div>
                <div style="display:flex; align-items:center; color:#d32f2f;"><div class="fraction" style="font-size:16px"><div class="num">11</div><div class="den">4</div></div></div>
            </div>
        </div>
    </div>

    <div class="quiz-grid" id="answer-content"></div>
</div>

<script>
    function getRandom(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    function init() {
        const today = new Date();
        const dateStr = `日期：${today.getFullYear()}年${today.getMonth() + 1}月${today.getDate()}日`;
        document.querySelectorAll('.date-display').forEach(el => el.innerText = dateStr);

        const quizContainer = document.getElementById('quiz-content');
        const ansContainer = document.getElementById('answer-content');
        
        let quizHtml = '';
        let ansHtml = '';

        for (let i = 1; i <= 40; i++) {
            const isToMixed = Math.random() > 0.5;
            const den = getRandom(2, 12);
            const whole = getRandom(1, 9);
            const rem = getRandom(1, den - 1);
            let prob, ans;

            if (isToMixed) {
                const num = (whole * den) + rem;
                prob = `<div class="fraction"><div class="num">${num}</div><div class="den">${den}</div></div>`;
                ans = `<span class="whole">${whole}</span><div class="fraction"><div class="num">${rem}</div><div class="den">${den}</div></div>`;
            } else {
                const num = (whole * den) + rem;
                prob = `<span class="whole">${whole}</span><div class="fraction"><div class="num">${rem}</div><div class="den">${den}</div></div>`;
                ans = `<div class="fraction"><div class="num">${num}</div><div class="den">${den}</div></div>`;
            }

            quizHtml += `<div class="q-item"><div class="q-main"><div class="q-num">${i}.</div><div class="math-box">${prob}</div><div class="equal">=</div><div class="ans-area"></div></div></div>`;
            ansHtml += `<div class="q-item"><div class="q-main"><div class="q-num">${i}.</div><div class="math-box">${prob}</div><div class="equal">=</div><div class="ans-area">${ans}</div></div></div>`;
        }

        quizContainer.innerHTML = quizHtml;
        ansContainer.innerHTML = ansHtml;
    }

    init();
</script>

</body>
</html>
