<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Math Quiz: 2D ± 1D (50題分層版)</title>
    <style>
        @page { size: A4; margin: 0.5cm; }
        body { font-family: "Microsoft JhengHei", sans-serif; margin: 0; padding: 0; background-color: #fff; line-height: 1.2; }
        .page-container { padding-top: 1cm; min-height: 28cm; box-sizing: border-box; }
        .no-print { background: #f1f8e9; padding: 15px; border: 1px solid #8bc34a; border-radius: 8px; margin: 10px; }
        .page-break { page-break-after: always; }
        .header-title { text-align: center; font-size: 22px; font-weight: bold; margin-top: 0; margin-bottom: 5px; }
        .info-bar { display: flex; justify-content: space-around; margin: 5px 15px; padding-bottom: 5px; border-bottom: 2px solid #000; font-size: 13px; }
        
        .example-section { 
            display: grid; grid-template-columns: repeat(2, 1fr); 
            gap: 10px; margin: 0 15px 10px 15px; padding: 8px; 
            border: 2px solid #444; border-radius: 8px; background-color: #fcfcfc; 
        }
        .ex-title { grid-column: span 2; font-weight: bold; font-size: 13px; color: #2e7d32; margin-bottom: 2px; }
        .step-hint { font-size: 10px; color: #666; margin-top: 1px; font-weight: bold; text-align: center;}
        
        /* 調整重點：改為 5 欄佈局以容納 50 題 */
        .quiz-grid { display: grid; grid-template-columns: repeat(5, 1fr); column-gap: 12px; padding: 0 15px; }
        /* 稍微降低題目高度 */
        .q-item { display: flex; flex-direction: column; justify-content: center; height: 70px; border-bottom: 1px dashed #bbb; }
        .q-main { display: flex; align-items: center; width: 100%; }
        .q-num { font-size: 11px; font-weight: bold; width: 22px; }
        
        .math-box { display: flex; align-items: center; font-size: 18px; min-width: 60px; justify-content: flex-start; font-weight: bold; }
        .equal { margin: 0 4px 0 2px; font-size: 15px; font-weight: bold; }
        
        .ans-area { flex-grow: 1; border-bottom: 1.5px solid #000; height: 28px; margin-right: 3px; }
        .is-answer-page .ans-area { border-bottom: none; color: #d32f2f; font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 16px; background: #fff5f5; }
        .is-answer-page .header-title { color: #d32f2f; }
        .is-answer-page .info-bar { border-bottom-color: #d32f2f; color: #d32f2f; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="no-print">
    <h3 style="margin:0;">🔢 兩位數與個位數加減 (50 題版)</h3>
    <p>難度分配：極易(12)、簡易(13)、普通(10)、極難(10)、地獄(5)。</p>
    <button onclick="window.print()" style="padding: 10px 20px; background: #2e7d32; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">🖨️ 滿版列印</button>
    <button onclick="location.reload()" style="padding: 10px 20px; margin-left:10px; cursor: pointer;">🔄 重新出題</button>
</div>

<div class="page-break page-container">
    <div class="header-title">Addition & Subtraction (2D ± 1D) - 50 Qs</div>
    <div class="info-bar">
        <span>姓名：__________</span>
        <span class="date-display"></span>
        <span>得分：__________</span>
    </div>
    
    <div class="example-section">
        <div class="ex-title">💡 解題示範</div>
        <div style="display:flex; flex-direction:column; border-right: 1px solid #ccc;">
            <div class="q-main">
                <span style="font-size:11px; font-weight:bold; margin-right:5px;">[例A]</span>
                <div class="math-box">28 + 5</div><div class="equal">=</div>
                <div style="color:#d32f2f; font-weight:bold; font-size:18px;">33</div>
            </div>
            <div class="step-hint">想：8 + 5 = 13，進位到十位</div>
        </div>
        <div style="display:flex; flex-direction:column;">
            <div class="q-main">
                <span style="font-size:11px; font-weight:bold; margin-right:5px;">[例B]</span>
                <div class="math-box">42 - 7</div><div class="equal">=</div>
                <div style="color:#d32f2f; font-weight:bold; font-size:18px;">35</div>
            </div>
            <div class="step-hint">想：2不夠減7，向十位借10</div>
        </div>
    </div>

    <div class="quiz-grid" id="quiz-content"></div>
</div>

<div class="is-answer-page page-container">
    <div class="header-title">【答案卷】2D ± 1D (50 Qs)</div>
    <div class="info-bar">
        <span class="date-display"></span>
        <span>對照題號批改</span>
    </div>
    <div class="quiz-grid" id="answer-content"></div>
</div>

<script>
    function init() {
        const today = new Date();
        const dateStr = `日期：${today.getFullYear()}年${today.getMonth() + 1}月${today.getDate()}日`;
        document.querySelectorAll('.date-display').forEach(el => el.innerText = dateStr);

        const quizContainer = document.getElementById('quiz-content');
        const ansContainer = document.getElementById('answer-content');
        
        let levels = { veryEasy: [], easy: [], normal: [], hard: [], hell: [] };

        for (let a = 10; a <= 99; a++) {
            for (let b = 1; b <= 9; b++) {
                ['+', '-'].forEach(op => {
                    let res = (op === '+') ? a + b : a - b;
                    if (res < 0) return;

                    let item = { a: a, b: b, op: op, ans: res };
                    
                    let isSpecial = false;
                    if (op === '+') {
                        if ((a % 10) + b >= 10) isSpecial = true;
                    } else {
                        if ((a % 10) < b) isSpecial = true;
                    }

                    if (!isSpecial) {
                        levels.veryEasy.push(item);
                    } else if (isSpecial && a < 50) {
                        levels.easy.push(item);
                    } else if (isSpecial && a < 80) {
                        levels.normal.push(item);
                    } else if (a < 95) {
                        levels.hard.push(item);
                    } else {
                        levels.hell.push(item);
                    }
                });
            }
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // 調整為 50 題的抽取比例
        let selected = [
            ...shuffle(levels.veryEasy).slice(0, 12),
            ...shuffle(levels.easy).slice(0, 13),
            ...shuffle(levels.normal).slice(0, 10),
            ...shuffle(levels.hard).slice(0, 10),
            ...shuffle(levels.hell).slice(0, 5)
        ];

        shuffle(selected);

        let quizHtml = '';
        let ansHtml = '';

        selected.forEach((item, index) => {
            const i = index + 1;
            const probStr = `${item.a} ${item.op} ${item.b}`;
            quizHtml += `<div class="q-item"><div class="q-main"><div class="q-num">${i}.</div><div class="math-box">${probStr}</div><div class="equal">=</div><div class="ans-area"></div></div></div>`;
            ansHtml += `<div class="q-item"><div class="q-main"><div class="q-num">${i}.</div><div class="math-box">${probStr}</div><div class="equal">=</div><div class="ans-area">${item.ans}</div></div></div>`;
        });

        quizContainer.innerHTML = quizHtml;
        ansContainer.innerHTML = ansHtml;
    }

    window.onload = init;
</script>

</body>
</html>
