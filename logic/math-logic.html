<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>邏輯填空挑戰 - GitHub 版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --bg: #fff; --accent: #d32f2f; }
        
        html, body { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #444; overflow: hidden;
        }

        .no-print { 
            height: 60px; background: #222; color: white;
            display: flex; justify-content: center; align-items: center; gap: 12px;
            z-index: 100; position: relative; padding: 0 10px;
        }
        input, .desc-input { padding: 5px; border-radius: 4px; border: none; text-align: center; }
        .desc-input { width: 300px; text-align: left; }
        button { padding: 6px 12px; cursor: pointer; border-radius: 4px; border: none; font-weight: bold; background: #e67e22; color: white; }

        .page-container {
            background: white; width: 210mm; height: 297mm;
            margin: 0 auto; padding: 10mm 12mm; box-sizing: border-box;
            display: flex; flex-direction: column; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .header { text-align: center; height: 35px; }
        .info-bar { 
            display: flex; justify-content: space-between; 
            border-bottom: 3px solid #000; padding: 5px;
            font-size: 16px; font-weight: bold;
        }

        .description-box {
            margin: 10px 0; padding: 8px; border: 1px solid #ccc;
            border-radius: 5px; background: #f9f9f9; font-size: 14px;
            line-height: 1.4; color: #333;
        }

        .quiz-grid { 
            display: grid; column-gap: 25px; row-gap: 0; flex: 1; min-height: 0; 
        }

        .q-item { 
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px dashed #ccc; height: 100%; padding: 2px 0;
        }

        .q-text { font-weight: bold; display: flex; align-items: center; flex: 1; min-width: 0; }
        .q-num { color: #888; font-size: 0.6em; width: 28px; flex-shrink: 0; }
        .q-text-inner { font-size: 80%; line-height: 1.2; word-break: break-all; }

        .ans-box { 
            border: 2.5px solid #000; border-radius: 8px;
            display: inline-flex; align-items: center; justify-content: center;
            margin-left: 10px; flex-shrink: 0;
        }

        .answer-sheet { display: none; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; overflow: visible; }
            .page-container { margin: 0; width: 210mm; height: 297mm; box-shadow: none; display: flex !important; page-break-after: always; }
            .answer-sheet { display: flex !important; }
            .ans-box { border-color: var(--accent); color: var(--accent); }
            .info-bar, .description-box { border-color: var(--accent); color: var(--accent); }
            .header { color: var(--accent); }
        }
    </style>
</head>
<body>

<div class="no-print">
    <span id="status" style="font-size: 14px; color: #4caf50;">正在載入 logic.xlsx...</span>
    <label>題數：</label>
    <input type="number" id="inputCount" value="20" min="1" style="width: 50px;">
    <label>說明：</label>
    <input type="text" id="descInput" class="desc-input" value="請仔細閱讀題目，並在右側方框中填入正確的比較詞（如：多、少、長、短）。">
    <button onclick="generate()">⚡ 重新抽題</button>
    <button onclick="window.print()" style="background: #27ae60;">🖨️ 列印</button>
</div>

<div class="page-container">
    <div class="header"><h2 id="title-text" style="margin:0;">邏輯推理挑戰題</h2></div>
    <div class="info-bar">
        <span>姓名：__________</span>
        <span id="date-str"></span>
        <span>得分：__________</span>
    </div>
    <div class="description-box" id="desc-box"></div>
    <div class="quiz-grid" id="q-grid"></div>
</div>

<div class="page-container answer-sheet">
    <div class="header"><h2 style="margin:0;">【答案卷】對照批改</h2></div>
    <div class="info-bar"><span>批改參考</span></div>
    <div class="description-box" id="desc-box-ans"></div>
    <div class="quiz-grid" id="a-grid"></div>
</div>

<script>
    let rawData = [];

    // 💡 核心功能：自動從同目錄抓取 logic.xlsx
    async function loadExcelAuto() {
        const status = document.getElementById('status');
        try {
            const response = await fetch('logic.xlsx');
            if (!response.ok) throw new Error('找不到 logic.xlsx 檔案');
            
            const arrayBuffer = await response.arrayBuffer();
            const data = new Uint8Array(arrayBuffer);
            const workbook = XLSX.read(data, {type: 'array'});
            const worksheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(worksheet, {header: 1});
            
            rawData = json.filter(row => row[0] && row[1]).map(row => ({
                q: row[0].toString(),
                a: row[1].toString()
            }));

            status.innerText = "✅ 題庫已載入";
            generate();
        } catch (error) {
            status.innerText = "❌ 載入失敗: " + error.message;
            status.style.color = "#ff5252";
        }
    }

    function generate() {
        const count = parseInt(document.getElementById('inputCount').value);
        const descText = document.getElementById('descInput').value;
        if (count <= 0 || rawData.length === 0) return;

        const today = new Date();
        document.getElementById('date-str').innerText = `日期：${today.getFullYear()}/${today.getMonth()+1}/${today.getDate()}`;
        document.getElementById('desc-box').innerText = "說明：" + descText;
        document.getElementById('desc-box-ans').innerText = "說明：" + descText;

        let cols = 2;
        if (count > 25) cols = 3;
        const rows = Math.ceil(count / cols);

        let baseSize = "1.5rem";
        let boxW = "75px", boxH = "55px";
        if (count > 20) { baseSize = "1.3rem"; boxW = "65px"; boxH = "45px"; }
        if (count > 40) { baseSize = "1.0rem"; boxW = "55px"; boxH = "35px"; }

        const qGrid = document.getElementById('q-grid');
        const aGrid = document.getElementById('a-grid');
        qGrid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        qGrid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
        aGrid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        aGrid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

        let selected = [...rawData].sort(() => Math.random() - 0.5).slice(0, count);

        let qHtml = '', aHtml = '';
        selected.forEach((item, i) => {
            const template = `
                <div class="q-item">
                    <div class="q-text" style="font-size: ${baseSize}">
                        <span class="q-num">${i+1}</span>
                        <span class="q-text-inner">${item.q}</span>
                    </div>
                    <div class="ans-box" style="width:${boxW}; height:${boxH};">##ANS##</div>
                </div>`;
            qHtml += template.replace('##ANS##', '');
            aHtml += template.replace('##ANS##', `<span style="font-size: 0.9em;">${item.a}</span>`);
        });

        qGrid.innerHTML = qHtml;
        aGrid.innerHTML = aHtml;
    }

    // 網頁開啟後自動執行
    window.onload = loadExcelAuto;
</script>
</body>
</html>
