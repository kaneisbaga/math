<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數學出題庫</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }
        .container {
            width: 90%;
            max-width: 800px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        .link-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }
        .link-item:hover {
            background-color: #f0f8ff;
        }
        .link-info {
            flex-grow: 1;
        }
        .link-title {
            font-size: 18px;
            font-weight: bold;
            color: #2980b9;
            text-decoration: none;
        }
        .link-url {
            font-size: 13px;
            color: #888;
            margin-top: 5px;
            display: block;
            word-break: break-all;
        }
        .go-btn {
            background-color: #3498db;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 5px;
            font-size: 14px;
            transition: background 0.3s;
        }
        .go-btn:hover {
            background-color: #2980b9;
        }
        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>數學出題庫</h1>

    <div id="link-list">
        <div class="link-item">
            <div class="link-info">
                <a href="https://kaneisbaga.github.io/math/Improper&Mixed.html" class="link-title">假分數與帶分數換算</a>
                <span class="link-url">https://kaneisbaga.github.io/math/Improper&Mixed.html</span>
            </div>
            <a href="https://kaneisbaga.github.io/math/Improper&Mixed.html" class="go-btn">開啟出題</a>
        </div>

        </div>

    <div class="footer">
        © 2026 數學自動出題系統
    </div>
</div>

</body>
</html>
