<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Math Hero: 國小四則運算 Pro</title>
    <style>
        :root { --bg: #ffffff; --text: #000000; --primary: #1976d2; }
        
        body { 
            font-family: "Microsoft JhengHei", Arial, sans-serif; 
            margin: 0; padding: 0;
        }

        .controls {
            position: sticky; top: 0; background: #f0f0f0;
            padding: 15px; z-index: 100; border-bottom: 1px solid #ccc;
            display: flex; gap: 12px; align-items: center;
        }

        @media print {
            .no-print { display: none !important; }
            .page-container { 
                width: 210mm; height: 297mm; 
                page-break-after: always; 
                margin: 0 auto;
                padding: 1.5cm 1cm;
                box-sizing: border-box;
            }
        }

        .page-container {
            width: 210mm; min-height: 297mm;
            padding: 20px; margin: 20px auto;
            border: 1px solid #ddd; background: white;
            display: flex; flex-direction: column;
        }

        .header-title { text-align: center; font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .info-bar { display: flex; justify-content: space-between; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 20px; }

        #quiz-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            column-gap: 20px; row-gap: 2px;
            flex-grow: 1;
        }

        /* 關鍵修改：讓內容靠左對齊，緊貼等號 */
        .q-item { 
            display: flex; align-items: center; justify-content: flex-start;
            height: 52px; border-bottom: 1px dashed #eee;
        }

        /* 關鍵修改：消除字母間距，確保數字與符號無縫隙 */
        .q-text { 
            font-size: 18px; 
            font-family: Arial, sans-serif; 
            letter-spacing: 0px; 
            margin: 0;
            padding: 0;
        }

        .ans-box { 
            width: 60px; height: 32px; 
            border: 1.2px solid #000; 
            border-radius: 2px; 
            margin-left: 2px; /* 這裡控制等號與框框的極微小距離，可設為 0 */
        }
    </style>
</head>
<body>

<div class="controls no-print">
    <strong>題數：</strong>
    <input type="number" id="qCount" value="40" style="width: 60px;">
    <button onclick="init()" style="background: #2e7d32; color: white; border: none; padding: 6px 12px; cursor: pointer;">生成題目</button>
    <button onclick="window.print()" style="background: #1976d2; color: white; border: none; padding: 6px 12px; cursor: pointer;">列印 A4</button>
</div>

<div id="main-content"></div>

<script>
    const ops = ['+', '-', '*', '/'];

    function r(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    // 檢查過程是否合法（0-99, 無負數, 除法整除）
    function checkStepByStep(expr) {
        try {
            let tempExpr = expr;
            // 1. 檢查括號內
            const bracketMatch = tempExpr.match(/\(([^)]+)\)/);
            if (bracketMatch) {
                const subRes = eval(bracketMatch[1]);
                if (subRes < 0 || subRes > 99 || !Number.isInteger(subRes)) return false;
                tempExpr = tempExpr.replace(bracketMatch[0], subRes);
            }

            // 2. 檢查乘除運算項
            const mulDivParts = expr.split(/[\+\-]/);
            for(let part of mulDivParts) {
                if(part.includes('*') || part.includes('/')) {
                    const pRes = eval(part);
                    if(pRes < 0 || pRes > 99 || !Number.isInteger(pRes)) return false;
                }
            }

            // 3. 檢查最終結果
            const finalRes = eval(expr);
            if (finalRes < 0 || finalRes > 99 || !Number.isInteger(finalRes)) return false;

            return true;
        } catch (e) { return false; }
    }

    function generateProblem() {
        let attempts = 0;
        while (attempts < 2000) {
            let n = [r(1, 40), r(1, 20), r(1, 15), r(1, 10)];
            n = n.sort(() => Math.random() - 0.5);
            let s = [ops[r(0,3)], ops[r(0,3)], ops[r(0,3)]];
            
            let forms = [
                `${n[0]}${s[0]}${n[1]}${s[1]}${n[2]}${s[2]}${n[3]}`,
                `(${n[0]}${s[0]}${n[1]})${s[1]}${n[2]}${s[2]}${n[3]}`,
                `${n[0]}${s[0]}(${n[1]}${s[1]}${n[2]})${s[2]}${n[3]}`,
                `${n[0]}${s[0]}${n[1]}${s[1]}(${n[2]}${s[2]}${n[3]})`
            ];
            
            let expr = forms[r(0, forms.length - 1)];
            if (expr.includes('/0')) continue;
            if (checkStepByStep(expr)) return expr;
            attempts++;
        }
        return "1+1+1+1"; 
    }

    function createPageHTML(pageNum, questions) {
        const d = new Date();
        const quizHtml = questions.map(q => {
            // 確保生成字串時沒有任何空格
            const cleanExpr = q.replace(/\*/g,'×').replace(/\//g,'÷').replace(/\s+/g, '');
            return `
                <div class="q-item">
                    <span class="q-text">${cleanExpr}=</span>
                    <div class="ans-box"></div>
                </div>
            `;
        }).join('');

        return `
            <div class="page-container">
                <div class="header-title">四則運算練習卷</div>
                <div class="info-bar">
                    <span>姓名：__________ 分數：______</span>
                    <span>P.${pageNum} | ${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}</span>
                </div>
                <div id="quiz-grid">${quizHtml}</div>
            </div>
        `;
    }

    function init() {
        const container = document.getElementById('main-content');
        const total = parseInt(document.getElementById('qCount').value) || 40;
        container.innerHTML = '';
        
        const perPage = 40; 
        const pageTotal = Math.ceil(total / perPage);

        for (let i = 1; i <= pageTotal; i++) {
            let questions = [];
            for (let j = 0; j < perPage && (questions.length + (i-1)*perPage) < total; j++) {
                questions.push(generateProblem());
            }
            container.insertAdjacentHTML('beforeend', createPageHTML(i, questions));
        }
    }

    window.onload = init;
</script>
</body>
</html>
