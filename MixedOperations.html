<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>國小四則運算練習器 v4</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; margin: 0; padding: 0; }
        .no-print { background: #f4f7f9; padding: 20px; text-align: center; border-bottom: 2px solid #ccc; }
        
        @media print {
            .no-print { display: none; }
            .page { height: 100vh; width: 100vw; page-break-after: always; display: flex; flex-direction: column; }
        }

        .page { padding: 30px 50px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; }
        h2 { text-align: center; margin: 0; font-size: 28px; letter-spacing: 2px; }

        .info-bar { display: flex; justify-content: space-around; margin: 15px 0 5px 0; font-size: 18px; font-weight: bold; }
        .header-line { border-bottom: 3px solid #000; margin-bottom: 20px; }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-auto-rows: 1fr;
            gap: 10px 40px;
            flex-grow: 1;
        }

        .q-item { display: flex; align-items: center; border-bottom: 1px solid #eee; padding: 5px 0; }
        .q-num { font-size: 14px; color: #888; width: 30px; text-align: left; }
        .q-text { font-size: 26px; font-weight: 900; color: #000; display: flex; align-items: center; letter-spacing: -1px; }

        .answer-box {
            display: inline-block;
            width: 80px; 
            height: 38px;
            border: 2px solid #000;
            margin-left: 5px;
            vertical-align: middle;
            position: relative;
        }

        .ans-value { color: blue; font-size: 24px; font-weight: bold; position: absolute; left: 10px; top: 0px; }
    </style>
</head>
<body>

<div class="no-print">
    <h1>📝 國小四則運算 (強化括號版)</h1>
    <p>保證含括號題 | 全程 0-99 | 無負數 | 四組數字</p>
    <label>題數：</label>
    <input type="number" id="qCount" value="20" min="10" max="40">
    <button onclick="generate()">重新產生題目</button>
    <button onclick="window.print()">列印考卷與答案</button>
</div>

<div id="main-container"></div>

<script>
    const ops = ['+', '-', '*', '/'];

    function formatDisplay(expr) {
        return expr.replaceAll('*', 'x').replaceAll('/', '÷');
    }

    // 嚴格檢核邏輯
    function validateAndSolve(expr) {
        try {
            // 1. 檢查括號內
            if (expr.includes('(')) {
                let innerMatch = expr.match(/\(([^)]+)\)/);
                if (innerMatch) {
                    let innerVal = eval(innerMatch[1]);
                    if (innerVal < 0 || innerVal > 99 || !Number.isInteger(innerVal)) return null;
                }
            }

            // 2. 檢查整體最終結果
            let finalResult = eval(expr);
            if (finalResult < 0 || finalResult > 99 || !Number.isInteger(finalResult)) return null;

            // 3. 模擬計算過程中的每一個步驟 (考慮運算優先級)
            // 這裡簡單化處理：如果是加減，從左到右不能有負或破百
            // 由於括號已經獨立檢查過，這裡主要針對排除 10-20+30 這類中間負數
            let parts = expr.replace(/\(|\)/g, '').split(/([\+\-\*\/])/);
            let checkVal = eval(parts[0]);
            for(let i=1; i<parts.length; i+=2) {
                let op = parts[i];
                let next = eval(parts[i+1]);
                checkVal = eval(`${checkVal}${op}${next}`);
                if (checkVal < 0 || checkVal > 99) return null;
            }

            return finalResult;
        } catch(e) { return null; }
    }

    function createSingleQuestion(forceParentheses) {
        let attempts = 0;
        while(attempts < 3000) {
            attempts++;
            let n = Array.from({length: 4}, () => Math.floor(Math.random() * 20) + 1);
            let o = Array.from({length: 3}, () => ops[Math.floor(Math.random()*4)]);
            
            let patterns = [];
            if (forceParentheses) {
                // 強制產生帶括號的模式
                patterns = [
                    `(${n[0]}${o[0]}${n[1]})${o[1]}${n[2]}${o[2]}${n[3]}`,
                    `${n[0]}${o[0]}(${n[1]}${o[1]}${n[2]})${o[2]}${n[3]}`,
                    `${n[0]}${o[0]}${n[1]}${o[1]}(${n[2]}${o[2]}${n[3]})`
                ];
            } else {
                patterns = [`${n[0]}${o[0]}${n[1]}${o[1]}${n[2]}${o[2]}${n[3]}`];
            }
            
            let target = patterns[Math.floor(Math.random()*patterns.length)];
            let result = validateAndSolve(target);
            
            if (result !== null) {
                return { q: formatDisplay(target), a: result };
            }
        }
    }

    function generate() {
        const num = document.getElementById('qCount').value;
        const container = document.getElementById('main-container');
        container.innerHTML = "";
        let data = [];
        
        for(let i=0; i<num; i++) {
            // 設定約 50% 的題目必須帶有括號
            let shouldHaveParentheses = (i % 2 === 0); 
            data.push(createSingleQuestion(shouldHaveParentheses));
        }

        const today = new Date().toLocaleDateString('zh-TW');
        const getHeader = (title) => `
            <div class="page">
                <h2>${title}</h2>
                <div class="info-bar">
                    <span>姓名：__________</span>
                    <span>日期：${today}</span>
                    <span>得分：__________</span>
                </div>
                <div class="header-line"></div>
                <div class="content-grid">
        `;

        let qHtml = getHeader("四則運算練習卷");
        data.forEach((d, i) => {
            qHtml += `<div class="q-item"><span class="q-num">${i+1}.</span><span class="q-text">${d.q}=<div class="answer-box"></div></span></div>`;
        });
        qHtml += `</div></div>`;

        let aHtml = getHeader("參考答案卷");
        data.forEach((d, i) => {
            aHtml += `<div class="q-item"><span class="q-num">${i+1}.</span><span class="q-text">${d.q}=<div class="answer-box"><span class="ans-value">${d.a}</span></div></span></div>`;
        });
        aHtml += `</div></div>`;

        container.innerHTML = qHtml + aHtml;
    }
    generate();
</script>
</body>
</html>
