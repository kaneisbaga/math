<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Math Hero: A4 Pro</title>
    <style>
        :root {
            --bg: #ffffff; --text: #000000; --card: #f9f9f9; --primary: #1976d2;
        }
        [data-theme="dark"] {
            --bg: #1a1a1a; --text: #f0f0f0; --card: #2d2d2d; --primary: #90caf9;
        }
        @page { size: A4; margin: 0; }
        
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg); color: var(--text);
            margin: 0; padding: 0; 
            overflow: hidden; /* 規範：一頁化無捲軸 */
            width: 100vw; height: 100vh;
        }

        /* 介面控制區 (不列印) */
        .controls {
            position: fixed; top: 10px; right: 10px; z-index: 100;
            display: flex; gap: 8px;
        }
        @media print { .no-print { display: none !important; } }

        .page-container { 
            width: 210mm; height: 297mm; /* 標準A4 */
            padding: 1cm; box-sizing: border-box;
            display: flex; flex-direction: column;
            margin: auto; position: relative;
        }

        .header-title { text-align: center; font-size: 24px; margin-bottom: 10px; }
        .info-bar { display: flex; justify-content: space-between; border-bottom: 2px solid var(--text); padding-bottom: 5px; margin-bottom: 15px; font-size: 14px; }

        /* 動態分欄 */
        #quiz-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 10px; flex-grow: 1; align-content: start;
        }

        .q-item { 
            display: flex; align-items: center; justify-content: space-between;
            height: 70px; border-bottom: 1px dashed #ccc; padding: 0 5px;
        }
        .q-text { font-size: 18px; font-weight: bold; }
        .ans-box { 
            width: 60px; height: 35px; border: 1.5px solid var(--text); 
            border-radius: 4px; display: flex; align-items: center; justify-content: center;
        }

        /* 排行榜樣式 */
        .rank-section { margin-top: 20px; border-top: 1px solid #ccc; padding-top: 10px; font-size: 12px; }
    </style>
</head>
<body data-theme="light">

<div class="controls no-print">
    <button onclick="toggleTheme()">☀️/🌙 模式</button>
    <input type="number" id="qCount" value="40" style="width: 50px;" title="題目數量">
    <button onclick="init()" style="background: var(--primary); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">生成題目</button>
    <button onclick="window.print()">🖨️ 列印A4</button>
</div>

<div class="page-container">
    <div class="header-title">數學運算挑戰賽</div>
    <div class="info-bar">
        <span>姓名：__________ 分數：______</span>
        <span id="current-date"></span>
    </div>
    
    <div id="quiz-grid"></div>

    <div class="rank-section">
        <strong>🏆 榮譽排行榜：</strong>
        <span id="rank-list">目前尚無紀錄</span>
    </div>
</div>

<script>
    // 1. 切換模式功能
    function toggleTheme() {
        const body = document.body;
        body.setAttribute('data-theme', body.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
    }

    // 2. 難度邏輯 (20% 分配)
    function generateProblem(level) {
        let a, b, c, op1, op2;
        const ops = ['+', '-', '*', '/'];
        
        switch(level) {
            case 0: // 極簡單: 10以內加減
                a = r(1, 10); b = r(1, 10);
                return Math.random() > 0.5 ? `${a}+${b}` : `${Math.max(a,b)}-${Math.min(a,b)}`;
            case 1: // 簡單: 50以內加減
                a = r(10, 50); b = r(10, 50);
                return Math.random() > 0.5 ? `${a}+${b}` : `${Math.max(a,b)}-${Math.min(a,b)}`;
            case 2: // 中等: 乘法口訣範圍
                a = r(2, 9); b = r(2, 9);
                return `${a}*${b}`;
            case 3: // 困難: 兩步驟運算 (遵守先乘除後加減)
                a = r(2, 10); b = r(2, 10); c = r(10, 30);
                return `${a}*${b}+${c}`;
            case 4: // 地獄: 除法與乘加混合
                a = r(50, 200); b = r(2, 9); // 確保整除
                let divA = b * r(5, 20);
                return `${divA}/${b}+${r(10, 50)}`;
        }
    }

    function r(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    function init() {
        const grid = document.getElementById('quiz-grid');
        const count = parseInt(document.getElementById('qCount').value) || 40;
        grid.innerHTML = '';
        
        // 設定日期
        const d = new Date();
        document.getElementById('current-date').innerText = `日期：${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;

        // 依照 20% 比例分配生成
        const segment = Math.floor(count / 5);
        for(let lv = 0; lv < 5; lv++) {
            for(let i = 0; i < segment; i++) {
                const prob = generateProblem(lv);
                // 規範：數字與符號間不要有空格，作答區在等號右邊
                const html = `
                    <div class="q-item">
                        <span class="q-text">${prob.replace(/\*/g,'×').replace(/\//g,'÷')}=</span>
                        <div class="ans-box"></div>
                    </div>`;
                grid.insertAdjacentHTML('beforeend', html);
            }
        }
        
        // 排行榜模擬數據
        const ranks = ["小明 100分", "小華 98分", "阿強 95分"];
        document.getElementById('rank-list').innerText = ranks.join(" | ");
    }

    window.onload = init;
</script>
</body>
</html>
