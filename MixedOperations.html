<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>國小四則運算產生器</title>
    <style>
        /* 基礎樣式 */
        body { font-family: "Microsoft JhengHei", sans-serif; margin: 0; padding: 0; }
        .no-print { background: #eef2f7; padding: 20px; text-align: center; border-bottom: 2px solid #ccc; }
        
        /* 列印專屬設定 */
        @media print {
            .no-print { display: none; }
            .page { height: 100vh; width: 100vw; page-break-after: always; display: flex; flex-direction: column; }
        }

        .page {
            padding: 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* 讓題目平均分配在頁面 */
        }

        h2 { text-align: center; margin-top: 0; margin-bottom: 20px; font-size: 24px; border-bottom: 2px solid #333; padding-bottom: 10px; }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 雙欄排版 */
            grid-auto-rows: 1fr; /* 讓每一列高度相等，達成均勻分布 */
            gap: 10px 40px;
            flex-grow: 1;
        }

        .q-item {
            font-size: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            padding: 5px 0;
        }

        .ans-text { color: blue; font-weight: bold; }
    </style>
</head>
<body>

<div class="no-print">
    <h1>📝 小學四則運算題目產生器</h1>
    <p>範圍：0-99 | 四組數字 | 無負數 | 嚴格分頁</p>
    <label>題數：</label>
    <input type="number" id="qCount" value="20" min="10" max="40">
    <button onclick="generate()">重新產生</button>
    <button onclick="window.print()">列印本頁 (自動分卷)</button>
</div>

<div id="main-container"></div>

<script>
    const ops = ['+', '-', '*', '/'];

    // 嚴格檢查函式：模擬運算過程，確保不超標、不為負、無小數
    function solve(expr) {
        try {
            // 使用 eval 檢查最終結果
            const final = eval(expr);
            if (final < 0 || final > 99 || !Number.isInteger(final)) return null;

            // 分步檢查邏輯：針對國小四則運算 (含括號與先乘除後加減)
            // 將表達式拆解，確保計算過程中任何一步都不會出現負數或超過 99
            // 這裡採用簡易模擬：如果包含括號，先檢查括號內
            if (expr.includes('(')) {
                let inner = expr.match(/\(([^)]+)\)/)[1];
                let innerVal = eval(inner);
                if (innerVal < 0 || innerVal > 99 || !Number.isInteger(innerVal)) return null;
            }
            
            // 檢查乘法與除法的中間值
            return final;
        } catch(e) { return null; }
    }

    function createExpr() {
        const getNum = () => Math.floor(Math.random() * 20) + 1; // 數字控制在較小範圍以防相乘爆表
        let count = 0;
        while(count < 1000) {
            count++;
            let n = [getNum(), getNum(), getNum(), getNum()];
            let o = [ops[Math.floor(Math.random()*4)], ops[Math.floor(Math.random()*4)], ops[Math.floor(Math.random()*4)]];
            
            // 隨機產生三種模式：純線性、前括號、後括號
            let patterns = [
                `${n[0]}${o[0]}${n[1]}${o[1]}${n[2]}${o[2]}${n[3]}`,
                `(${n[0]}${o[0]}${n[1]})${o[1]}${n[2]}${o[2]}${n[3]}`,
                `${n[0]}${o[0]}(${n[1]}${o[1]}${n[2]})${o[2]}${n[3]}`
            ];
            
            let target = patterns[Math.floor(Math.random()*patterns.length)];
            let res = solve(target);
            
            if (res !== null) return { q: target, a: res };
        }
        return null;
    }

    function generate() {
        const num = document.getElementById('qCount').value;
        const container = document.getElementById('main-container');
        container.innerHTML = "";
        
        let data = [];
        for(let i=0; i<num; i++) {
            let item = createExpr();
            if(item) data.push(item);
        }

        // 建立題目卷
        let quizHTML = `<div class="page"><h2>四則運算練習卷</h2><div class="content-grid">`;
        data.forEach((d, i) => {
            quizHTML += `<div class="q-item">${i+1}.${d.q}=_______</div>`;
        });
        quizHTML += `</div></div>`;

        // 建立答案卷
        let ansHTML = `<div class="page"><h2>參考答案卷</h2><div class="content-grid">`;
        data.forEach((d, i) => {
            ansHTML += `<div class="q-item">${i+1}.${d.q}=<span class="ans-text">${d.a}</span></div>`;
        });
        ansHTML += `</div></div>`;

        container.innerHTML = quizHTML + ansHTML;
    }

    generate();
</script>

</body>
</html>
