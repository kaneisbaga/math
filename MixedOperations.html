<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Math Quiz: Mixed (No Spaces)</title>
    <style>
        @page { size: A4; margin: 0.5cm; }
        body { font-family: "Microsoft JhengHei", sans-serif; margin: 0; padding: 0; background-color: #fff; line-height: 1.1; }
        .page-container { padding-top: 0.8cm; min-height: 28cm; box-sizing: border-box; }
        .no-print { background: #e3f2fd; padding: 15px; border: 1px solid #2196f3; border-radius: 8px; margin: 10px; }
        .page-break { page-break-after: always; }
        .header-title { text-align: center; font-size: 20px; font-weight: bold; margin-top: 0; margin-bottom: 5px; }
        .info-bar { display: flex; justify-content: space-around; margin: 2px 15px; padding-bottom: 5px; border-bottom: 2px solid #000; font-size: 13px; }
        
        .example-section { 
            display: grid; grid-template-columns: repeat(2, 1fr); 
            gap: 10px; margin: 0 15px 8px 15px; padding: 6px; 
            border: 2px solid #444; border-radius: 8px; background-color: #fcfcfc; 
        }
        .ex-title { grid-column: span 2; font-weight: bold; font-size: 13px; color: #1565c0; margin-bottom: 2px; }
        .step-hint { font-size: 10px; color: #666; margin-top: 1px; font-weight: bold; text-align: center;}
        
        .quiz-grid { display: grid; grid-template-columns: repeat(4, 1fr); column-gap: 15px; padding: 0 15px; }
        .q-item { display: flex; flex-direction: column; justify-content: center; height: 62px; border-bottom: 1px dashed #bbb; }
        .q-main { display: flex; align-items: center; width: 100%; }
        .q-num { font-size: 11px; font-weight: bold; width: 22px; color: #666; }
        
        /* 調整 math-box 使其緊湊 */
        .math-box { display: flex; align-items: center; font-size: 16px; min-width: 85px; justify-content: flex-start; font-weight: bold; }
        .equal { margin: 0 4px 0 2px; font-size: 14px; font-weight: bold; }
        
        .ans-area { flex-grow: 1; border-bottom: 1.5px solid #000; height: 26px; margin-right: 3px; }
        .is-answer-page .ans-area { border-bottom: none; color: #d32f2f; font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 16px; background: #fff5f5; }
        .is-answer-page .header-title { color: #d32f2f; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="no-print">
    <h3 style="margin:0;">📝 國小四則運算 (緊湊版)</h3>
    <p>移除所有空白，維持 50 題 4 欄排版。</p>
    <button onclick="window.print()" style="padding: 10px 20px; background: #1976d2; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">🖨️ 滿版列印</button>
    <button onclick="location.reload()" style="padding: 10px 20px; margin-left:10px; cursor: pointer;">🔄 重新出題</button>
</div>

<div class="page-break page-container">
    <div class="header-title">Mixed Operations Quiz (No Spaces)</div>
    <div class="info-bar">
        <span>姓名：__________</span>
        <span class="date-display"></span>
        <span>得分：__________</span>
    </div>
    
    <div class="example-section">
        <div class="ex-title">💡 運算規則示範</div>
        <div style="display:flex; flex-direction:column; border-right: 1px solid #ccc;">
            <div class="q-main">
                <span style="font-size:11px; font-weight:bold; margin-right:5px;">[例A]</span>
                <div class="math-box">10+5×2</div><div class="equal">=</div>
                <div style="color:#d32f2f; font-weight:bold; font-size:18px;">20</div>
            </div>
            <div class="step-hint">先乘除後加減</div>
        </div>
        <div style="display:flex; flex-direction:column;">
            <div class="q-main">
                <span style="font-size:11px; font-weight:bold; margin-right:5px;">[例B]</span>
                <div class="math-box">(20-4)÷4</div><div class="equal">=</div>
                <div style="color:#d32f2f; font-weight:bold; font-size:18px;">4</div>
            </div>
            <div class="step-hint">括號先算</div>
        </div>
    </div>

    <div class="quiz-grid" id="quiz-content"></div>
</div>

<div class="is-answer-page page-container">
    <div class="header-title">【答案卷】Mixed Operations</div>
    <div class="info-bar">
        <span class="date-display"></span>
        <span>對照題號批改</span>
    </div>
    <div class="quiz-grid" id="answer-content"></div>
</div>

<script>
    function init() {
        const today = new Date();
        const dateStr = `日期：${today.getFullYear()}年${today.getMonth() + 1}月${today.getDate()}日`;
        document.querySelectorAll('.date-display').forEach(el => el.innerText = dateStr);

        const quizContainer = document.getElementById('quiz-content');
        const ansContainer = document.getElementById('answer-content');
        
        let pool = [];
        function r(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        while(pool.length < 150) {
            let type = r(1, 5);
            let a, b, c, d, text, ans;

            if (type === 1) { // a+b*c
                b = r(2, 9); c = r(2, 9); a = r(5, 40);
                text = `${a}+${b}×${c}`; ans = a + (b * c);
            } else if (type === 2) { // (a-b)/c
                c = r(2, 9); ans = r(2, 10); b = r(5, 15);
                a = (ans * c) + b;
                text = `(${a}-${b})÷${c}`;
            } else if (type === 3) { // a*b-c
                a = r(3, 12); b = r(2, 9); c = r(1, (a * b) - 1);
                text = `${a}×${b}-${c}`; ans = (a * b) - c;
            } else if (type === 4) { // a/b+c
                b = r(2, 9); ans = r(2, 10); a = b * ans; c = r(5, 25);
                text = `${a}÷${b}+${c}`; ans = (a / b) + c;
            } else { // a+b-c*d
                c = r(2, 5); d = r(2, 6); a = r(15, 40); b = r(10, 25);
                text = `${a}+${b}-${c}×${d}`; ans = a + b - (c * d);
            }

            if (ans > 0 && ans < 150) {
                pool.push({ text: text, ans: ans });
            }
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        let selected = shuffle(pool).slice(0, 50);

        let quizHtml = '';
        let ansHtml = '';

        selected.forEach((item, index) => {
            const i = index + 1;
            quizHtml += `<div class="q-item"><div class="q-main"><div class="q-num">${i}.</div><div class="math-box">${item.text}</div><div class="equal">=</div><div class="ans-area"></div></div></div>`;
            ansHtml += `<div class="q-item"><div class="q-main"><div class="q-num">${i}.</div><div class="math-box">${item.text}</div><div class="equal">=</div><div class="ans-area">${item.ans}</div></div></div>`;
        });

        quizContainer.innerHTML = quizHtml;
        ansContainer.innerHTML = ansHtml;
    }

    window.onload = init;
</script>

</body>
</html>
