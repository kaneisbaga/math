<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Math Hero: 國小四則運算 (標準版)</title>
    <style>
        :root { --bg: #ffffff; --text: #000000; }
        
        body { 
            font-family: "Microsoft JhengHei", Arial, sans-serif; 
            margin: 0; padding: 0; background-color: #f5f5f5;
        }

        /* 介面控制區 */
        .controls {
            position: sticky; top: 0; background: #fff;
            padding: 15px; z-index: 100; border-bottom: 2px solid #ccc;
            display: flex; gap: 12px; align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* A4 列印規範 */
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .page-container { 
                width: 210mm; height: 297mm; 
                page-break-after: always; 
                margin: 0 auto;
                padding: 1.2cm 1cm;
                box-sizing: border-box;
                border: none !important;
                display: flex;
                flex-direction: column;
            }
        }

        .page-container {
            width: 210mm; height: 297mm;
            padding: 1.2cm 1cm; margin: 20px auto;
            border: 1px solid #ddd; background: white;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .header-section { margin-bottom: 15px; }
        .header-title { text-align: center; font-size: 26px; font-weight: bold; margin-bottom: 8px; }
        .info-bar { display: flex; justify-content: space-between; border-bottom: 2.5px solid #000; padding-bottom: 6px; font-size: 14px; }

        /* 題目網格排版 */
        #quiz-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            column-gap: 30px; 
            row-gap: 0px; 
            flex-grow: 1;
            align-content: start;
        }

        .q-item { 
            display: flex; align-items: center; justify-content: flex-start;
            height: 58px; /* 固定高度確保每頁剛好 40 題 */
            border-bottom: 1px dashed #ddd;
        }

        .q-no {
            font-size: 14px; color: #666; width: 35px;
            font-family: Arial; font-weight: normal;
        }

        .q-text { 
            font-size: 19px; 
            font-family: Arial, sans-serif; 
            letter-spacing: 0px; 
            margin: 0; padding: 0;
            font-weight: bold;
        }

        .ans-box { 
            width: 65px; height: 34px; 
            border: 1.5px solid #000; 
            border-radius: 2px; 
            margin-left: 1px;
        }
    </style>
</head>
<body>

<div class="controls no-print">
    <strong>生成總題數：</strong>
    <input type="number" id="qCount" value="40" min="1" step="40" style="width: 70px; padding: 5px;">
    <button onclick="init()" style="background: #2e7d32; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold;">生成題目</button>
    <button onclick="window.print()" style="background: #1976d2; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold;">🖨️ 列印 A4</button>
    <span style="font-size: 12px; color: #555;">(建議設為 40 的倍數)</span>
</div>

<div id="main-content"></div>

<script>
    const ops = ['+', '-', '*', '/'];
    let globalQIndex = 1; // 全域題號

    function r(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    // 檢查運算過程 (0-99, 無負數, 除法整除)
    function checkStepByStep(expr) {
        try {
            let tempExpr = expr;
            // 1. 處理括號
            const bracketMatch = tempExpr.match(/\(([^)]+)\)/);
            if (bracketMatch) {
                const subRes = eval(bracketMatch[1]);
                if (subRes < 0 || subRes > 99 || !Number.isInteger(subRes)) return false;
                tempExpr = tempExpr.replace(bracketMatch[0], subRes);
            }

            // 2. 處理乘除部分
            const parts = expr.split(/[\+\-]/);
            for(let p of parts) {
                if(p.includes('*') || p.includes('/')) {
                    const res = eval(p);
                    if(res < 0 || res > 99 || !Number.isInteger(res)) return false;
                }
            }

            // 3. 最終結果
            const final = eval(expr);
            if (final < 0 || final > 99 || !Number.isInteger(final)) return false;

            return true;
        } catch (e) { return false; }
    }

    function generateProblem() {
        let attempts = 0;
        while (attempts < 2000) {
            let n = [r(1, 40), r(1, 20), r(1, 15), r(1, 10)];
            n = n.sort(() => Math.random() - 0.5);
            let s = [ops[r(0,3)], ops[r(0,3)], ops[r(0,3)]];
            
            let forms = [
                `${n[0]}${s[0]}${n[1]}${s[1]}${n[2]}${s[2]}${n[3]}`,
                `(${n[0]}${s[0]}${n[1]})${s[1]}${n[2]}${s[2]}${n[3]}`,
                `${n[0]}${s[0]}(${n[1]}${s[1]}${n[2]})${s[2]}${n[3]}`,
                `${n[0]}${s[0]}${n[1]}${s[1]}(${n[2]}${s[2]}${n[3]})`
            ];
            
            let expr = forms[r(0, forms.length - 1)];
            if (expr.includes('/0')) continue;
            if (checkStepByStep(expr)) return expr;
            attempts++;
        }
        return "1+1+1+1"; 
    }

    function createPageHTML(pageNum, questions) {
        const d = new Date();
        const quizHtml = questions.map(q => {
            const cleanExpr = q.replace(/\*/g,'×').replace(/\//g,'÷').replace(/\s+/g, '');
            const itemHtml = `
                <div class="q-item">
                    <span class="q-no">${globalQIndex}.</span>
                    <span class="q-text">${cleanExpr}=</span>
                    <div class="ans-box"></div>
                </div>
            `;
            globalQIndex++;
            return itemHtml;
        }).join('');

        return `
            <div class="page-container">
                <div class="header-section">
                    <div class="header-title">四則運算強化訓練卷</div>
                    <div class="info-bar">
                        <span>姓名：__________ 分數：______</span>
                        <span>日期：${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} (第 ${pageNum} 頁)</span>
                    </div>
                </div>
                <div id="quiz-grid">${quizHtml}</div>
            </div>
        `;
    }

    function init() {
        const container = document.getElementById('main-content');
        const total = parseInt(document.getElementById('qCount').value) || 40;
        container.innerHTML = '';
        globalQIndex = 1; // 重置題號
        
        const perPage = 40; 
        const pageTotal = Math.ceil(total / perPage);

        for (let i = 1; i <= pageTotal; i++) {
            let questions = [];
            for (let j = 0; j < perPage && (questions.length + (i-1)*perPage) < total; j++) {
                questions.push(generateProblem());
            }
            container.insertAdjacentHTML('beforeend', createPageHTML(i, questions));
        }
    }

    window.onload = init;
</script>
</body>
</html>
