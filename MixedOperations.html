<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Math Quiz: Ultra Compact 76px</title>
    <style>
        @page { size: A4; margin: 0.5cm; }
        body { font-family: "Microsoft JhengHei", sans-serif; margin: 0; padding: 0; background-color: #fff; }
        
        .page-container { 
            padding: 0.2cm 0.8cm; 
            height: 28.5cm; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }
        
        .no-print { background: #f0f4f8; padding: 10px; border: 1px solid #1976d2; border-radius: 6px; margin: 10px; }
        .page-break { page-break-after: always; }
        
        .header-title { text-align: center; font-size: 18px; font-weight: bold; margin-bottom: 2px; }
        .info-bar { display: flex; justify-content: space-between; margin-bottom: 6px; padding-bottom: 3px; border-bottom: 2px solid #000; font-size: 12px; }
        
        .quiz-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            column-gap: 30px; 
            flex-grow: 1;
        }

        .q-item { 
            display: flex; 
            align-items: center; 
            height: 76px; /* 依照需求調整為 76px */
            border-bottom: 1px dashed #ddd;
            padding: 0;
        }

        .q-content {
            display: flex;
            align-items: center;
            font-size: 15px; /* 稍微縮小字體以配合高度 */
            font-weight: bold;
            white-space: nowrap;
            min-width: 125px;
        }

        .q-num { font-size: 10px; color: #888; width: 20px; margin-right: 2px; }
        .equal { margin: 0 6px 0 4px; }

        /* 答題方格 */
        .ans-box { 
            width: 110px; 
            height: 36px; /* 配合 76px 高度稍微降 2px */
            border: 1.5px solid #000; 
            border-radius: 5px;
            flex-shrink: 0;
        }

        /* 答案卷 */
        .is-answer-page .ans-box { 
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d32f2f;
            font-size: 17px;
            border-color: #d32f2f;
            background-color: #fffafa;
        }

        .is-answer-page .header-title { color: #d32f2f; }
        
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="no-print">
    <h3 style="margin:0;">🎯 最終壓縮版 (高度 76px)</h3>
    <p>題目 25 題，答案格 110px 長度。此版面最適合 A4 滿版列印。</p>
    <button onclick="window.print()" style="padding: 8px 16px; background: #1976d2; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">🖨️ 滿版列印</button>
    <button onclick="location.reload()" style="padding: 8px 16px; margin-left:10px; cursor: pointer;">🔄 重新出題</button>
</div>

<div class="page-container">
    <div class="header-title">Mixed Operations Challenge (25 Problems)</div>
    <div class="info-bar">
        <span>姓名：________________</span>
        <span class="date-display"></span>
        <span>得分：____________</span>
    </div>
    <div class="quiz-grid" id="quiz-content"></div>
</div>

<div class="page-break"></div>
<div class="page-container is-answer-page">
    <div class="header-title">【答案卷】Mixed Operations</div>
    <div class="info-bar">
        <span class="date-display"></span>
        <span>批改核對用</span>
    </div>
    <div class="quiz-grid" id="answer-content"></div>
</div>

<script>
    function init() {
        const today = new Date();
        document.querySelectorAll('.date-display').forEach(el => 
            el.innerText = `日期：${today.getFullYear()} / ${today.getMonth()+1} / ${today.getDate()}`);

        const usedQuestions = new Set();
        const usedAnswers = new Set();
        const pool = [];

        function r(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        function generateProblem() {
            const ops = ['+', '-', '*', '/'];
            const dOps = {'+': '+', '-': '-', '*': '×', '/': '÷'};
            let n = Array.from({length: 4}, () => r(2, 30));
            let pattern = r(0, 1);
            let expr, result;

            try {
                if (pattern === 0) { 
                    let o1 = ops[r(0, 3)], o2 = ops[r(0, 3)], o3 = ops[r(0, 3)];
                    let v1 = evalSafe(n[0], n[1], o1);
                    let v2 = evalSafe(n[2], n[3], o2);
                    result = evalSafe(v1, v2, o3);
                    expr = `(${n[0]}${dOps[o1]}${n[1]})${dOps[o3]}(${n[2]}${dOps[o2]}${n[3]})`;
                } else { 
                    let o1 = ops[r(0, 3)], o2 = ops[r(0, 3)], o3 = ops[r(0, 3)];
                    let v1 = evalSafe(n[0], n[1], o1);
                    let v2 = evalSafe(v1, n[2], o2);
                    result = evalSafe(v2, n[3], o3);
                    expr = `(${n[0]}${dOps[o1]}${n[1]}${dOps[o2]}${n[2]})${dOps[o3]}${n[3]}`;
                }

                if (result !== null && result > 0 && result < 100 && Number.isInteger(result)) {
                    return { text: expr, ans: result };
                }
            } catch (e) { return null; }
            return null;
        }

        function evalSafe(a, b, op) {
            if (a === null || b === null) return null;
            let res;
            if (op === '+') res = a + b;
            if (op === '-') res = a - b;
            if (op === '*') res = a * b;
            if (op === '/') {
                if (b === 0 || a % b !== 0) return null;
                res = a / b;
            }
            if (res < 0 || res > 99) return null;
            return res;
        }

        while (pool.length < 25) {
            let p = generateProblem();
            if (p && !usedQuestions.has(p.text) && !usedAnswers.has(p.ans)) {
                usedQuestions.add(p.text);
                usedAnswers.add(p.ans);
                pool.push(p);
            }
        }

        let qH = '', aH = '';
        pool.forEach((item, i) => {
            let common = `<div class="q-content"><span class="q-num">${i+1}.</span>${item.text}<span class="equal">=</span></div>`;
            qH += `<div class="q-item">${common}<div class="ans-box"></div></div>`;
            aH += `<div class="q-item">${common}<div class="ans-box">${item.ans}</div></div>`;
        });

        document.getElementById('quiz-content').innerHTML = qH;
        document.getElementById('answer-content').innerHTML = aH;
    }
    window.onload = init;
</script>

</body>
</html>
